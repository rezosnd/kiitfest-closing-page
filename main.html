<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You | KIIT Fest 9.0 — Pixels to Purpose</title>
    <meta name="description" content="Thank you for making KIIT Fest 9.0 unforgettable. From pixels to purpose — see you next year.">
    <meta name="theme-color" content="#0a0a0a">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

    <!-- Stylesheet -->
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <!-- Preloader -->
    <div class="preloader" id="preloader">
        <div class="preloader-inner">
            <img src="assets/kiitfest-wordmark.avif" alt="KIIT Fest 9.0" class="preloader-logo">
        </div>
    </div>

    <!-- Background Carousel -->
    <div class="bg-carousel" id="bgCarousel">
        <div class="carousel-overlay"></div>
    </div>

    <!-- Single Fullscreen View -->
    <div class="page-content">
        <section class="hero">

            <div class="hero-logo-wrap">
                <img src="assets/kiitfest-wordmark.avif" alt="KIIT Fest 9.0" class="hero-logo">
            </div>

            <div class="hero-tag">Pixels to Purpose</div>

            <h1 class="hero-title">
                Thank You for Making<br>
                KIIT Fest 9.0 <em>Unforgettable.</em>
            </h1>

            <p class="hero-subtitle">
                From every idea to every experience,<br class="hide-mobile">
                thank you for being part of this journey.
            </p>

            <div class="hero-closing">See you again next year</div>



        </section>
    </div>

    <!-- Scripts -->
    <script src="script.js"></script>
</body>

</html>
